# Reusable workflow for Nix builds
name: Nix Build

on:
  workflow_call:

jobs:
  nix-build:
    name: Nix Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Build with Nix
        run: nix build .#werx

      - name: Verify binary
        run: ./result/bin/werx --version
