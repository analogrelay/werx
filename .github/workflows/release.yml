name: Release

on:
  workflow_dispatch:

jobs:
  validate:
    name: Validate Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from Cargo.toml
        id: version
        run: |
          VERSION=$(grep -m1 '^version = ' Cargo.toml | sed -E 's/version = "([0-9]+\.[0-9]+\.[0-9]+)"/\1/')
          if [[ -z "$VERSION" ]]; then
            echo "Error: Could not extract version from Cargo.toml" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing version: $VERSION"

      - name: Validate changelog is marked
        run: ./script/helpers/post-release --check

  build:
    needs: validate
    uses: ./.github/workflows/_build.yml
    with:
      check-args: "--build --release"
      upload-artifacts: true
      fail-fast: true

  nix-build:
    needs: validate
    uses: ./.github/workflows/_nix-build.yml

  release:
    name: Create Release
    needs: [validate, build, nix-build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ needs.validate.outputs.version }}" -m "Release v${{ needs.validate.outputs.version }}"
          git push origin "v${{ needs.validate.outputs.version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.validate.outputs.version }}
          name: v${{ needs.validate.outputs.version }}
          files: dist/*
          generate_release_notes: true

  post-release:
    name: Post-Release Version Bump
    needs: [validate, release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run post-release tasks
        run: ./script/helpers/post-release

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: post-release version bump after v${{ needs.validate.outputs.version }}"
          title: "chore: post-release version bump after v${{ needs.validate.outputs.version }}"
          body: |
            This PR contains the post-release updates after v${{ needs.validate.outputs.version }}:
            - Bumped Cargo.toml to next patch version
            - Marked changelog entry as released
            - Created new unreleased changelog entry

            Auto-generated by the release workflow.
          branch: post-release/v${{ needs.validate.outputs.version }}
          base: main
