name: Release

on:
  workflow_dispatch:

jobs:
  validate:
    name: Validate Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from Cargo.toml
        id: version
        run: |
          VERSION=$(grep -m1 '^version = ' Cargo.toml | sed -E 's/version = "([0-9]+\.[0-9]+\.[0-9]+)"/\1/')
          if [[ -z "$VERSION" ]]; then
            echo "Error: Could not extract version from Cargo.toml" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing version: $VERSION"

      - name: Check version is not already released on GitHub
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "v${{ steps.version.outputs.version }}" &>/dev/null; then
            echo "::error::GitHub Release v${{ steps.version.outputs.version }} already exists"
            exit 1
          fi
          echo "No existing GitHub Release for v${{ steps.version.outputs.version }}"

      - name: Check version is not already published on crates.io
        run: |
          CRATE_VERSION=$(curl -sf "https://crates.io/api/v1/crates/werx/${{ steps.version.outputs.version }}" | jq -r '.version.num // empty')
          if [[ -n "$CRATE_VERSION" ]]; then
            echo "::error::Version ${{ steps.version.outputs.version }} is already published on crates.io"
            exit 1
          fi
          echo "Version ${{ steps.version.outputs.version }} is not yet on crates.io"

      - name: Validate CARGO_REGISTRY_TOKEN
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [[ -z "$CARGO_REGISTRY_TOKEN" ]]; then
            echo "::error::CARGO_REGISTRY_TOKEN secret is not set"
            exit 1
          fi
          # Validate the token by querying the authenticated user's crates.io account
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: $CARGO_REGISTRY_TOKEN" https://crates.io/api/v1/me)
          if [[ "$HTTP_STATUS" != "200" ]]; then
            echo "::error::CARGO_REGISTRY_TOKEN is invalid (HTTP $HTTP_STATUS from crates.io)"
            exit 1
          fi
          echo "CARGO_REGISTRY_TOKEN is valid"

      - name: Validate changelog is ready for release
        run: ./script/helpers/post-release --check

  build:
    needs: validate
    uses: ./.github/workflows/_build.yml
    with:
      check-args: "--build --release"
      upload-artifacts: true
      fail-fast: true

  nix-build:
    needs: validate
    uses: ./.github/workflows/_nix-build.yml

  release:
    name: Create Release
    needs: [validate, build, nix-build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ needs.validate.outputs.version }}" -m "Release v${{ needs.validate.outputs.version }}"
          git push origin "v${{ needs.validate.outputs.version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.validate.outputs.version }}
          name: v${{ needs.validate.outputs.version }}
          files: dist/*
          generate_release_notes: true

  publish:
    name: Publish to crates.io
    needs: [validate, release]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: v${{ needs.validate.outputs.version }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  post-release:
    name: Post-Release Version Bump
    needs: [validate, release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run post-release tasks
        run: ./script/helpers/post-release

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: post-release version bump after v${{ needs.validate.outputs.version }}"
          title: "chore: post-release version bump after v${{ needs.validate.outputs.version }}"
          body: |
            This PR contains the post-release updates after v${{ needs.validate.outputs.version }}:
            - Bumped Cargo.toml to next patch version
            - Marked changelog entry as released
            - Created new unreleased changelog entry

            Auto-generated by the release workflow.
          branch: post-release/v${{ needs.validate.outputs.version }}
          base: main
