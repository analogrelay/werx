# Reusable workflow for Rust build/check jobs
name: Build

on:
  workflow_call:
    inputs:
      check-args:
        description: "Arguments to pass to ./script/check"
        required: true
        type: string
      upload-artifacts:
        description: "Whether to package and upload release binaries"
        required: false
        type: boolean
        default: false
      fail-fast:
        description: "Whether to fail fast on matrix errors"
        required: false
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  build:
    name: ${{ inputs.upload-artifacts && 'Build' || 'Check' }} (${{ matrix.os }}-${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: ${{ inputs.fail-fast }}
      matrix:
        include:
          - os: linux
            arch: x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: linux
            arch: aarch64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: macos
            arch: aarch64
            runner: macos-latest
            target: aarch64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup install

      - name: Install OpenCode
        run: npm install -g opencode-ai

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run checks
        run: ./script/check ${{ inputs.check-args }}

      - name: Package binary
        if: inputs.upload-artifacts
        run: |
          mkdir -p dist
          cp target/release/werx dist/werx-${{ matrix.os }}-${{ matrix.arch }}

      - name: Upload artifact
        if: inputs.upload-artifacts
        uses: actions/upload-artifact@v4
        with:
          name: werx-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/werx-${{ matrix.os }}-${{ matrix.arch }}
